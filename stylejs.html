<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Practice Tasks</title>
</head>
<body>

    <h2>Open  Output</h2>

<script>

// Task 1 – Variable + Output

let name = "vijay";
let age = 24;
let city = "Bangalore";

console.log("My name is " + name + ".");
console.log("I am " + age + " years old.");
console.log("I am from " + city + ".");


// Task 2 – Alert + Confirm + Prompt

let userName = prompt("Enter your name:");
alert("Welcome " + userName + "!");

let learnJS = confirm("Do you want to learn JavaScript?");

if (learnJS) {
    alert("Great Choice!");
} else {
    alert("No Problem!");
}


// Task 3 – Data Type Checker

let str = "Hello";
let num = 456;
let bool = true;
let undef;
let nul = null;

console.log("Value:", str, "| Type:", typeof str);
console.log("Value:", num, "| Type:", typeof num);
console.log("Value:", bool, "| Type:", typeof bool);
console.log("Value:", undef, "| Type:", typeof undef);
console.log("Value:", nul, "| Type:", typeof nul);


// Task 4 – Array Practice

let colors = ["Red", "Blue", "Green", "Yellow", "Black", "White"];

console.log("First Color:", colors[0]);
console.log("Last Color:", colors[colors.length - 1]);
console.log("Total Colors:", colors.length);

console.log("All Colors:");
for (let i = 0; i < colors.length; i++) {
    console.log(i, ":", colors[i]);
}


// Task 5 – Array Dynamic Access

let subjects = ["Math", "Science", "English", "History", "Computer"];
let index = prompt("Enter a number between 0 to 4:");

console.log("Selected Subject:", subjects[index]);


// Task 6 – Object Practice

let student = {
    name: "shantha",
    age: 23,
    course: "CSE",
    skills: ["HTML", "CSS", "JavaScript"]
};

console.log("Student Name:", student.name);
console.log("Second Skill:", student.skills[1]);
console.log("Course Name:", student.course);


// Task 7 – Mixed Concept Task

let product = {
    name: "Iphone",
    price: 1,45000,
    category: "Electronics",
    inStock: true
};

console.log("Product Name:", product.name);
console.log("Price:", product.price);

if (product.inStock) {
    console.log("Available: Yes");
} else {
    console.log("Out of Stock");
}


// Task 8 – Fruit Object Advanced

let fruits = {
    tropical: ["mango", "pineapple"],
    berries: ["strawberry", "blueberry"],
    citrus: ["orange", "lemon"]
};

console.log("Blueberry:", fruits.berries[1]);
console.log("Mango:", fruits.tropical[0]);
console.log("Lemon:", fruits.citrus[1]);

let totalCategories = Object.keys(fruits).length;
console.log("Total Categories:", totalCategories);


</script>

</body>
</html>
